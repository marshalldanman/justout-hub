<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAP Live — Voice to Text</title>
  <meta name="description" content="Live voice dictation — speak and see your words appear in real-time.">
  <style>
    :root {
      --jap-primary: #00e5ff;
      --jap-deep: #004d5a;
      --jap-accent: #76ff03;
      --jap-warn: #ff4444;
      --jap-bg: #0a0e1a;
      --jap-surface: rgba(15, 23, 42, 0.85);
      --jap-text: #e2e8f0;
      --jap-muted: #64748b;
      --jap-border: rgba(0, 229, 255, 0.15);
      --jap-font: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--jap-font);
      background: var(--jap-bg);
      color: var(--jap-text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      width: 600px; height: 600px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
      animation: breathe 6s ease-in-out infinite;
      pointer-events: none; z-index: 0;
    }

    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
      50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.8; }
    }

    /* ---- Nav ---- */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px;
      background: rgba(10, 14, 26, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--jap-border);
    }

    .nav a {
      color: var(--jap-muted); text-decoration: none;
      font-size: 0.75rem; transition: color 0.2s;
    }
    .nav a:hover { color: var(--jap-primary); }

    .nav-title {
      font-size: 0.85rem; font-weight: 700;
      color: var(--jap-primary); letter-spacing: 0.1em;
    }

    .nav-status {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.7rem; color: var(--jap-muted);
    }

    /* ---- Mic Button ---- */
    .mic-area {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 80px 20px 20px;
    }

    .mic-btn {
      width: 100px; height: 100px;
      border-radius: 50%;
      border: 2px solid var(--jap-border);
      background: var(--jap-surface);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem;
      transition: all 0.3s;
      position: relative;
      backdrop-filter: blur(12px);
    }

    .mic-btn:hover {
      border-color: var(--jap-primary);
      box-shadow: 0 0 30px rgba(0,229,255,0.2);
    }

    .mic-btn.listening {
      border-color: var(--jap-warn);
      box-shadow: 0 0 40px rgba(255,68,68,0.3), 0 0 80px rgba(255,68,68,0.1);
      animation: mic-pulse 1.5s ease-in-out infinite;
    }

    @keyframes mic-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Ripple rings when listening */
    .mic-btn.listening::before,
    .mic-btn.listening::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--jap-warn);
      animation: ripple 2s ease-out infinite;
    }
    .mic-btn.listening::before {
      top: -10px; left: -10px; right: -10px; bottom: -10px;
    }
    .mic-btn.listening::after {
      top: -20px; left: -20px; right: -20px; bottom: -20px;
      animation-delay: 0.5s;
    }

    @keyframes ripple {
      0% { opacity: 0.6; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.4); }
    }

    .mic-label {
      margin-top: 14px;
      font-size: 0.75rem;
      color: var(--jap-muted);
      letter-spacing: 0.08em;
    }

    .mic-label.active { color: var(--jap-warn); }

    /* ---- Live Text Area ---- */
    .live-area {
      position: relative; z-index: 1;
      max-width: 720px;
      margin: 20px auto 0;
      padding: 0 20px 40px;
    }

    .live-panel {
      background: var(--jap-surface);
      border: 1px solid var(--jap-border);
      border-radius: 12px;
      padding: 24px;
      backdrop-filter: blur(12px);
      min-height: 200px;
    }

    .live-panel h2 {
      font-size: 0.75rem; font-weight: 700;
      color: var(--jap-primary); text-transform: uppercase;
      letter-spacing: 0.12em; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }

    .live-panel h2::before {
      content: ''; width: 3px; height: 14px;
      background: var(--jap-primary); border-radius: 2px;
    }

    /* Current (in-progress) line */
    .live-current {
      font-size: 1.3rem;
      line-height: 1.6;
      color: #fff;
      min-height: 40px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 16px;
      margin-bottom: 16px;
    }

    .live-current .interim {
      color: rgba(0, 229, 255, 0.6);
      font-style: italic;
    }

    .live-cursor {
      display: inline-block;
      width: 2px; height: 1.2em;
      background: var(--jap-primary);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    .listening .live-cursor {
      background: var(--jap-warn);
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* Transcript history */
    .transcript-history {
      max-height: 400px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--jap-deep) transparent;
    }

    .transcript-line {
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--jap-text);
      animation: fade-in 0.3s ease-out;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .transcript-time {
      color: var(--jap-muted);
      font-size: 0.65rem;
      margin-right: 8px;
    }

    /* ---- Controls Bar ---- */
    .controls {
      display: flex; gap: 10px; margin-top: 16px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 600;
      font-family: var(--jap-font);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border: 1px solid var(--jap-border);
      background: rgba(0,229,255,0.05);
      color: var(--jap-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .ctrl-btn:hover {
      color: var(--jap-primary);
      border-color: var(--jap-primary);
      background: rgba(0,229,255,0.1);
    }

    /* ---- Stats ---- */
    .stats {
      display: flex; gap: 20px; margin-top: 16px;
      flex-wrap: wrap;
    }

    .stat {
      font-size: 0.65rem;
      color: var(--jap-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-val {
      color: var(--jap-text);
      font-weight: 700;
      margin-left: 4px;
    }

    /* ---- Empty state ---- */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--jap-muted);
    }

    .empty-state-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
    .empty-state-text { font-size: 0.8rem; line-height: 1.8; }

    /* ---- Unsupported ---- */
    .unsupported {
      text-align: center; padding: 60px 20px;
      color: var(--jap-warn);
    }

    /* ---- Responsive ---- */
    @media (max-width: 480px) {
      .mic-btn { width: 80px; height: 80px; font-size: 2rem; }
      .live-current { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/JapHQ/">&larr; JAP HQ</a>
    <span class="nav-title">JAP LIVE</span>
    <div class="nav-status">
      <span class="jap-dot" id="statusDot" style="width:8px;height:8px;border-radius:50%;background:#64748b;display:inline-block"></span>
      <span id="statusText">Ready</span>
    </div>
  </nav>

  <div class="mic-area">
    <button class="mic-btn" id="micBtn" title="Click to start listening">&#x1f399;</button>
    <div class="mic-label" id="micLabel">Tap to start</div>
  </div>

  <div class="live-area">
    <div class="live-panel" id="livePanel">
      <h2>Live Dictation</h2>

      <div class="live-current" id="liveCurrent">
        <div class="empty-state" id="emptyState">
          <div class="empty-state-icon">&#x1f50a;</div>
          <div class="empty-state-text">
            Tap the mic and start talking.<br>
            Your words will appear here in real-time.
          </div>
        </div>
      </div>

      <div class="transcript-history" id="transcriptHistory"></div>

      <div class="controls">
        <button class="ctrl-btn" id="btnCopy" title="Copy all text">Copy All</button>
        <button class="ctrl-btn" id="btnClear" title="Clear transcript">Clear</button>
        <button class="ctrl-btn" id="btnDownload" title="Download as text file">Download</button>
      </div>

      <div class="stats">
        <div class="stat">Words<span class="stat-val" id="statWords">0</span></div>
        <div class="stat">Lines<span class="stat-val" id="statLines">0</span></div>
        <div class="stat">Duration<span class="stat-val" id="statDuration">0:00</span></div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      // ---- Check browser support ----
      var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        document.querySelector('.mic-area').innerHTML =
          '<div class="unsupported">Speech recognition not supported in this browser.<br>Try Chrome, Edge, or Safari.</div>';
        return;
      }

      // ---- Elements ----
      var micBtn = document.getElementById('micBtn');
      var micLabel = document.getElementById('micLabel');
      var liveCurrent = document.getElementById('liveCurrent');
      var emptyState = document.getElementById('emptyState');
      var history = document.getElementById('transcriptHistory');
      var statusDot = document.getElementById('statusDot');
      var statusText = document.getElementById('statusText');
      var statWords = document.getElementById('statWords');
      var statLines = document.getElementById('statLines');
      var statDuration = document.getElementById('statDuration');

      // ---- State ----
      var isListening = false;
      var fullTranscript = [];   // Array of finalized lines
      var currentText = '';      // In-progress text
      var interimText = '';
      var startTime = null;
      var durationTimer = null;
      var totalWords = 0;

      // ---- Speech Recognition Setup ----
      var recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      recognition.maxAlternatives = 1;

      // ---- Handlers ----
      recognition.onstart = function () {
        isListening = true;
        micBtn.classList.add('listening');
        micLabel.classList.add('active');
        micLabel.textContent = 'Listening...';
        statusDot.style.background = '#ff4444';
        statusDot.style.boxShadow = '0 0 8px #ff4444';
        statusText.textContent = 'Listening';
        document.body.classList.add('listening');

        if (emptyState) emptyState.remove();

        if (!startTime) {
          startTime = Date.now();
          durationTimer = setInterval(updateDuration, 1000);
        }
      };

      recognition.onend = function () {
        // Auto-restart if still supposed to be listening
        if (isListening) {
          try { recognition.start(); } catch (e) { stopListening(); }
          return;
        }
        stopListening();
      };

      recognition.onerror = function (e) {
        if (e.error === 'not-allowed') {
          micLabel.textContent = 'Mic access denied';
          stopListening();
        } else if (e.error === 'no-speech') {
          // Ignore, keep listening
        } else {
          micLabel.textContent = 'Error: ' + e.error;
          setTimeout(function () {
            if (isListening) micLabel.textContent = 'Listening...';
          }, 2000);
        }
      };

      recognition.onresult = function (event) {
        var final = '';
        var interim = '';

        for (var i = event.resultIndex; i < event.results.length; i++) {
          var transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            final += transcript;
          } else {
            interim += transcript;
          }
        }

        // Finalized text — commit to history
        if (final) {
          currentText += final;
          commitLine(currentText.trim());
          currentText = '';
        }

        // Update live display
        interimText = interim;
        renderLive();
      };

      // ---- Render ----
      function renderLive() {
        var display = currentText + interimText;
        if (display) {
          liveCurrent.innerHTML =
            '<span>' + escapeHtml(currentText) + '</span>' +
            '<span class="interim">' + escapeHtml(interimText) + '</span>' +
            '<span class="live-cursor"></span>';
        } else if (isListening) {
          liveCurrent.innerHTML = '<span class="interim">Waiting for speech...</span><span class="live-cursor"></span>';
        } else if (fullTranscript.length === 0) {
          liveCurrent.innerHTML =
            '<div class="empty-state"><div class="empty-state-icon">&#x1f50a;</div>' +
            '<div class="empty-state-text">Tap the mic and start talking.<br>Your words will appear here in real-time.</div></div>';
        } else {
          liveCurrent.innerHTML = '<span class="live-cursor"></span>';
        }
      }

      function commitLine(text) {
        if (!text) return;

        fullTranscript.push(text);

        var line = document.createElement('div');
        line.className = 'transcript-line';
        var now = new Date();
        var time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        line.innerHTML = '<span class="transcript-time">' + time + '</span>' + escapeHtml(text);
        history.appendChild(line);
        history.scrollTop = history.scrollHeight;

        // Update stats
        totalWords += text.split(/\s+/).filter(Boolean).length;
        statWords.textContent = totalWords;
        statLines.textContent = fullTranscript.length;
      }

      function updateDuration() {
        if (!startTime) return;
        var elapsed = Math.floor((Date.now() - startTime) / 1000);
        var m = Math.floor(elapsed / 60);
        var s = elapsed % 60;
        statDuration.textContent = m + ':' + (s < 10 ? '0' : '') + s;
      }

      // ---- Controls ----
      function startListening() {
        try {
          recognition.start();
        } catch (e) {
          // Already running
        }
      }

      function stopListening() {
        isListening = false;
        try { recognition.stop(); } catch (e) {}
        micBtn.classList.remove('listening');
        micLabel.classList.remove('active');
        micLabel.textContent = 'Tap to start';
        statusDot.style.background = '#64748b';
        statusDot.style.boxShadow = 'none';
        statusText.textContent = 'Paused';
        document.body.classList.remove('listening');

        // Commit any remaining text
        if (currentText.trim()) {
          commitLine(currentText.trim());
          currentText = '';
          interimText = '';
          renderLive();
        }
      }

      micBtn.addEventListener('click', function () {
        if (isListening) {
          stopListening();
        } else {
          startListening();
        }
      });

      // Copy
      document.getElementById('btnCopy').addEventListener('click', function () {
        var text = fullTranscript.join('\n');
        if (!text) return;
        navigator.clipboard.writeText(text).then(function () {
          var btn = document.getElementById('btnCopy');
          btn.textContent = 'Copied!';
          setTimeout(function () { btn.textContent = 'Copy All'; }, 1500);
        });
      });

      // Clear
      document.getElementById('btnClear').addEventListener('click', function () {
        fullTranscript = [];
        totalWords = 0;
        history.innerHTML = '';
        statWords.textContent = '0';
        statLines.textContent = '0';
        renderLive();
      });

      // Download
      document.getElementById('btnDownload').addEventListener('click', function () {
        var text = fullTranscript.join('\n');
        if (!text) return;
        var blob = new Blob([text], { type: 'text/plain' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'jap-transcript-' + new Date().toISOString().slice(0, 10) + '.txt';
        a.click();
        URL.revokeObjectURL(url);
      });

      // ---- Utility ----
      function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

    })();
  </script>
</body>
</html>
