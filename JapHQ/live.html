<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAP Live — BEE Feed</title>
  <meta name="description" content="Live transcript feed from BEE device.">
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: rgba(15, 23, 42, 0.85);
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #00e5ff;
      --green: #76ff03;
      --red: #ff4444;
      --yellow: #fbbf24;
      --border: rgba(0, 229, 255, 0.12);
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Auth Gate ---- */
    #authGate {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg); text-align: center; padding: 40px;
    }
    #authGate.hidden { display: none; }

    .auth-title { font-size: 1.4rem; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
    .auth-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }

    .auth-btn {
      padding: 14px 40px; border-radius: 50px;
      border: 2px solid var(--accent);
      background: rgba(0,229,255,0.08);
      color: var(--accent); font-size: 0.9rem;
      font-weight: 700; font-family: var(--font);
      cursor: pointer; transition: all 0.3s;
    }
    .auth-btn:hover { background: rgba(0,229,255,0.15); box-shadow: 0 0 30px rgba(0,229,255,0.15); }

    .auth-err { color: var(--red); font-size: 0.75rem; margin-top: 12px; min-height: 1.2em; }
    .auth-loading { color: var(--muted); font-size: 0.75rem; margin-top: 8px; }

    /* ---- Top Bar ---- */
    .topbar {
      position: sticky; top: 0; z-index: 10;
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px;
      background: rgba(10, 14, 26, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .topbar a { color: var(--muted); text-decoration: none; font-size: 0.7rem; }
    .topbar a:hover { color: var(--accent); }

    .topbar-center { display: flex; align-items: center; gap: 8px; }

    .topbar-title {
      font-size: 0.75rem; font-weight: 700;
      color: var(--accent); letter-spacing: 0.1em;
      font-family: var(--mono);
    }

    .badge {
      font-size: 0.55rem; padding: 2px 6px;
      border-radius: 4px; font-weight: 700; letter-spacing: 0.06em;
    }
    .badge-live { background: rgba(118,255,3,0.12); color: var(--green); border: 1px solid rgba(118,255,3,0.25); }
    .badge-off { background: rgba(100,116,139,0.12); color: var(--muted); border: 1px solid rgba(100,116,139,0.25); }

    .topbar-user {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.65rem; color: var(--muted);
    }
    .topbar-user img { width: 20px; height: 20px; border-radius: 50%; }

    /* ---- Feed ---- */
    .feed {
      flex: 1; overflow-y: auto; padding: 12px 16px 80px;
    }

    .feed-entry {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      animation: fade-in 0.3s ease-out;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .feed-meta {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 4px;
    }

    .feed-time {
      font-size: 0.6rem; color: var(--muted);
      font-family: var(--mono);
    }

    .feed-speaker {
      font-size: 0.6rem; color: var(--accent);
      font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .feed-type {
      font-size: 0.55rem; padding: 1px 5px;
      border-radius: 3px; font-weight: 600;
      letter-spacing: 0.04em;
    }
    .type-bee { background: rgba(0,229,255,0.08); color: var(--accent); }
    .type-note { background: rgba(251,191,36,0.1); color: var(--yellow); }

    .feed-text {
      font-size: 1rem; line-height: 1.7;
      color: var(--text);
    }

    .feed-note .feed-text { color: var(--yellow); font-style: italic; }

    .feed-empty {
      text-align: center; padding: 80px 20px; color: var(--muted);
    }
    .feed-empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.3; }
    .feed-empty-text { font-size: 0.85rem; line-height: 1.8; }

    /* ---- Bottom Bar ---- */
    .bottombar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      background: rgba(10, 14, 26, 0.92);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 8px 12px;
      display: flex; gap: 6px; align-items: center;
    }

    .note-input {
      flex: 1; min-width: 0;
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text); font-size: 0.8rem;
      font-family: var(--font);
      outline: none; transition: border-color 0.2s;
    }
    .note-input::placeholder { color: var(--muted); }
    .note-input:focus { border-color: var(--accent); }

    .bb-btn {
      padding: 9px 14px; border-radius: 8px;
      font-size: 0.65rem; font-weight: 600;
      font-family: var(--mono); letter-spacing: 0.04em;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      cursor: pointer; transition: all 0.2s;
      white-space: nowrap;
    }
    .bb-btn:hover { color: var(--accent); border-color: var(--accent); }

    .bb-btn-send { background: rgba(0,229,255,0.1); border-color: rgba(0,229,255,0.3); color: var(--accent); }
    .autoflow-on { color: var(--green) !important; border-color: rgba(118,255,3,0.3) !important; }

    .mic-on { color: var(--red) !important; border-color: var(--red) !important; background: rgba(255,68,68,0.1) !important; animation: mic-pulse 1.5s ease-in-out infinite; }
    @keyframes mic-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

    .type-mic { background: rgba(255,68,68,0.1); color: var(--red); }

    /* Interim text shown above bottom bar */
    .interim-bar {
      position: fixed; bottom: 52px; left: 0; right: 0; z-index: 9;
      padding: 6px 16px;
      background: rgba(10, 14, 26, 0.85);
      backdrop-filter: blur(8px);
      font-size: 0.8rem; color: rgba(0,229,255,0.5);
      font-style: italic;
      display: none;
      border-top: 1px solid var(--border);
    }
    .interim-bar.visible { display: block; }

    /* ---- Scroll indicator ---- */
    .scroll-down {
      position: fixed; bottom: 64px; right: 16px; z-index: 11;
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--accent); font-size: 1rem;
      display: none; align-items: center; justify-content: center;
      cursor: pointer; backdrop-filter: blur(8px);
    }
    .scroll-down.visible { display: flex; }

    @media (max-width: 480px) {
      .feed-text { font-size: 0.9rem; }
      .topbar-user span { display: none; }
    }
  </style>
</head>
<body>

  <!-- Auth Gate -->
  <div id="authGate">
    <div class="auth-title">JAP Live</div>
    <div class="auth-sub">Sign in to view the BEE feed</div>
    <button class="auth-btn" id="googleSignIn">Sign In with Google</button>
    <div class="auth-err" id="authErr"></div>
    <div class="auth-loading" id="authLoading"></div>
  </div>

  <!-- Top Bar -->
  <nav class="topbar" id="topbar" style="display:none">
    <a href="/JapHQ/">&larr; JAP HQ</a>
    <div class="topbar-center">
      <span class="topbar-title">BEE FEED</span>
      <span class="badge badge-off" id="feedBadge">CONNECTING</span>
    </div>
    <div class="topbar-user" id="userInfo"></div>
  </nav>

  <!-- Feed -->
  <div class="feed" id="feed" style="display:none">
    <div class="feed-empty" id="feedEmpty">
      <div class="feed-empty-icon">&#x1f41d;</div>
      <div class="feed-empty-text">
        Listening for BEE...<br>
        Transcripts appear here as JAP-B records them.
      </div>
    </div>
  </div>

  <div class="scroll-down" id="scrollDown">&#x2193;</div>

  <!-- Bottom Bar -->
  <div class="bottombar" id="bottombar" style="display:none">
    <input type="text" class="note-input" id="noteInput" placeholder="Add a note..." maxlength="500" aria-label="Add a note to the feed">
    <button class="bb-btn bb-btn-send" id="btnSend">Add</button>
    <button class="bb-btn" id="btnMic" title="Toggle browser mic dictation">Mic</button>
    <button class="bb-btn autoflow-on" id="btnAutoflow" title="Toggle auto-scroll">Auto</button>
    <button class="bb-btn" id="btnCopy">Copy</button>
  </div>

  <div class="interim-bar" id="interimBar"></div>

  <script>
    (function () {
      'use strict';

      var FIREBASE_CONFIG = {
        apiKey: 'AIzaSyBgYAPO_0cEvhPzfU6GZykJVUnF55LEzXQ',
        authDomain: 'fpcs-dashboard-63b25.firebaseapp.com',
        projectId: 'fpcs-dashboard-63b25',
        storageBucket: 'fpcs-dashboard-63b25.firebasestorage.app',
        messagingSenderId: '377879797743',
        appId: '1:377879797743:web:61a56f9bf69f2df9eba01a',
        databaseURL: 'https://fpcs-dashboard-63b25-default-rtdb.firebaseio.com'
      };

      var AUTH_HASHES = [
        '2cf3a7d6f68c22e431d35aec11129074f9bb677598de0fe85df3ba3c0f513365',
        'e12a8bb46e8823a5fd6e6c997c573b4088ff4dbe09ec3ee3da994d33a810a674',
        'e48e3b564e4c384c6215fcf3215abac1c95df04e5e7f862d5d1d8c91ff977cba'
      ];

      var DB_PATH = 'jap/feed';

      var feedEl    = document.getElementById('feed');
      var feedEmpty = document.getElementById('feedEmpty');
      var feedBadge = document.getElementById('feedBadge');
      var noteInput = document.getElementById('noteInput');
      var scrollBtn = document.getElementById('scrollDown');

      var autoflow    = true;
      var entries     = [];
      var dbRef       = null;
      var currentUser = null;

      /* ---- Auth ---- */
      function hashEmail(email) {
        if (!crypto.subtle) return Promise.resolve('');
        return crypto.subtle.digest('SHA-256', new TextEncoder().encode(email))
          .then(function (buf) {
            return Array.from(new Uint8Array(buf))
              .map(function (b) { return b.toString(16).padStart(2, '0'); })
              .join('');
          });
      }

      function isAllowed(email) {
        return hashEmail(email.toLowerCase()).then(function (hash) {
          return AUTH_HASHES.indexOf(hash) !== -1;
        });
      }

      function initAuth() {
        firebase.initializeApp(FIREBASE_CONFIG);
        var auth = firebase.auth();

        auth.onAuthStateChanged(function (user) {
          if (user) {
            isAllowed(user.email).then(function (ok) {
              if (ok) {
                currentUser = user;
                showApp(user);
                connectFeed();
              } else {
                document.getElementById('authErr').textContent = 'Not authorized.';
                auth.signOut();
              }
            });
          }
        });

        document.getElementById('googleSignIn').addEventListener('click', function () {
          var btn = this;
          var err = document.getElementById('authErr');
          var load = document.getElementById('authLoading');
          err.textContent = '';
          load.textContent = 'Signing in...';
          btn.disabled = true;

          var provider = new firebase.auth.GoogleAuthProvider();
          provider.setCustomParameters({ prompt: 'select_account' });
          auth.signInWithPopup(provider).then(function () {
            load.textContent = '';
          }).catch(function (e) {
            load.textContent = '';
            btn.disabled = false;
            err.textContent = e.message || 'Sign-in failed';
          });
        });
      }

      function showApp(user) {
        document.getElementById('authGate').classList.add('hidden');
        document.getElementById('topbar').style.display = 'flex';
        feedEl.style.display = 'block';
        document.getElementById('bottombar').style.display = 'flex';

        var info = document.getElementById('userInfo');
        var html = '';
        if (user.photoURL) html += '<img src="' + esc(user.photoURL) + '" alt="">';
        html += '<span>' + esc(user.displayName || 'User') + '</span>';
        info.innerHTML = html;
      }

      /* ---- Firebase feed ---- */
      function connectFeed() {
        var db = firebase.database();
        dbRef = db.ref(DB_PATH);

        dbRef.orderByChild('ts').limitToLast(200).on('child_added', function (snap) {
          var data = snap.val();
          if (data) addEntry(data, snap.key);
        });

        db.ref('.info/connected').on('value', function (snap) {
          if (snap.val() === true) {
            feedBadge.textContent = 'LIVE';
            feedBadge.className = 'badge badge-live';
          } else {
            feedBadge.textContent = 'OFFLINE';
            feedBadge.className = 'badge badge-off';
          }
        });
      }

      /* ---- Render ---- */
      function addEntry(data, key) {
        if (feedEmpty && feedEmpty.parentNode) {
          feedEmpty.remove();
          feedEmpty = null;
        }
        if (entries.some(function (e) { return e.key === key; })) return;
        entries.push({ key: key, data: data });

        var el = document.createElement('div');
        var isNote = data.type === 'note';
        var isMic = data.type === 'mic';
        el.className = 'feed-entry' + (isNote ? ' feed-note' : '');

        var ts = data.ts ? new Date(data.ts) : new Date();
        var time = ts.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        var date = ts.toLocaleDateString([], { month: 'short', day: 'numeric' });

        var typeClass = isNote ? 'type-note' : (isMic ? 'type-mic' : 'type-bee');
        var typeLabel = isNote ? 'NOTE' : (isMic ? 'MIC' : 'BEE');

        el.innerHTML =
          '<div class="feed-meta">' +
            '<span class="feed-time">' + date + ' ' + time + '</span>' +
            '<span class="feed-speaker">' + esc(data.speaker || 'BEE') + '</span>' +
            '<span class="feed-type ' + typeClass + '">' + typeLabel + '</span>' +
          '</div>' +
          '<div class="feed-text">' + esc(data.text || '') + '</div>';

        feedEl.appendChild(el);
        while (feedEl.children.length > 300) feedEl.removeChild(feedEl.firstChild);
        if (autoflow) feedEl.scrollTop = feedEl.scrollHeight;
      }

      /* ---- Add note ---- */
      function addNote() {
        var text = noteInput.value.trim();
        if (!text) return;

        if (dbRef && currentUser) {
          dbRef.push({
            type: 'note',
            speaker: currentUser.displayName || 'Commander',
            text: text,
            ts: firebase.database.ServerValue.TIMESTAMP,
            uid: currentUser.uid
          });
        } else {
          addEntry({ type: 'note', speaker: 'Local', text: text, ts: Date.now() },
            'local-' + Date.now());
        }
        noteInput.value = '';
      }

      document.getElementById('btnSend').addEventListener('click', addNote);
      noteInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); addNote(); }
      });

      /* ---- Autoflow ---- */
      function isNearBottom() {
        return feedEl.scrollHeight - feedEl.scrollTop - feedEl.clientHeight < 80;
      }

      feedEl.addEventListener('scroll', function () {
        if (!autoflow && isNearBottom()) {
          autoflow = true;
          document.getElementById('btnAutoflow').classList.add('autoflow-on');
          scrollBtn.classList.remove('visible');
        } else if (autoflow && !isNearBottom()) {
          autoflow = false;
          document.getElementById('btnAutoflow').classList.remove('autoflow-on');
          scrollBtn.classList.add('visible');
        }
      });

      document.getElementById('btnAutoflow').addEventListener('click', function () {
        autoflow = !autoflow;
        this.classList.toggle('autoflow-on', autoflow);
        if (autoflow) {
          feedEl.scrollTop = feedEl.scrollHeight;
          scrollBtn.classList.remove('visible');
        }
      });

      scrollBtn.addEventListener('click', function () {
        autoflow = true;
        document.getElementById('btnAutoflow').classList.add('autoflow-on');
        feedEl.scrollTop = feedEl.scrollHeight;
        scrollBtn.classList.remove('visible');
      });

      /* ---- Browser Mic (Speech Recognition) ---- */
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      var micOn = false;
      var rec = null;
      var micBtn = document.getElementById('btnMic');
      var interimBar = document.getElementById('interimBar');
      var restartTimer = null;

      if (SR) {
        rec = new SR();
        rec.continuous = true;
        rec.interimResults = true;
        rec.lang = 'en-US';
        rec.maxAlternatives = 3;

        rec.onstart = function () {
          micOn = true;
          micBtn.classList.add('mic-on');
          micBtn.textContent = 'Stop';
          feedBadge.textContent = 'MIC LIVE';
          feedBadge.className = 'badge badge-live';
          // Restart every 50s to avoid Chrome 60s timeout
          clearTimeout(restartTimer);
          restartTimer = setTimeout(function () {
            if (micOn) { try { rec.stop(); } catch(e){} }
          }, 50000);
        };

        rec.onend = function () {
          clearTimeout(restartTimer);
          if (micOn) {
            // Auto-restart
            try { rec.start(); } catch(e) { stopMic(); }
            return;
          }
          stopMic();
        };

        rec.onerror = function (e) {
          if (e.error === 'not-allowed') {
            stopMic();
            feedBadge.textContent = 'MIC DENIED';
            feedBadge.className = 'badge badge-off';
          }
          // Ignore no-speech, aborted — keep listening
        };

        rec.onresult = function (event) {
          var finals = '';
          var interim = '';

          for (var i = event.resultIndex; i < event.results.length; i++) {
            var r = event.results[i];
            if (r.isFinal) {
              var best = r[0].transcript;
              var bestC = r[0].confidence;
              for (var a = 1; a < r.length; a++) {
                if (r[a].confidence > bestC) { best = r[a].transcript; bestC = r[a].confidence; }
              }
              finals += best;
            } else {
              interim += r[0].transcript;
            }
          }

          // Show interim
          if (interim) {
            interimBar.textContent = interim;
            interimBar.classList.add('visible');
          } else {
            interimBar.classList.remove('visible');
          }

          // Commit finals
          if (finals) {
            interimBar.classList.remove('visible');
            var cleaned = cleanText(finals);
            if (cleaned) {
              var entry = { type: 'mic', speaker: 'Commander', text: cleaned, ts: Date.now() };
              // Push to Firebase if connected
              if (dbRef && currentUser) {
                dbRef.push({
                  type: 'mic',
                  speaker: currentUser.displayName || 'Commander',
                  text: cleaned,
                  ts: firebase.database.ServerValue.TIMESTAMP,
                  uid: currentUser.uid
                });
              } else {
                addEntry(entry, 'mic-' + Date.now() + '-' + Math.random());
              }
            }
          }
        };
      } else {
        micBtn.style.display = 'none';
      }

      function startMic() {
        if (!rec) return;
        try { rec.start(); } catch(e) {}
      }

      function stopMic() {
        micOn = false;
        clearTimeout(restartTimer);
        try { rec.stop(); } catch(e) {}
        micBtn.classList.remove('mic-on');
        micBtn.textContent = 'Mic';
        interimBar.classList.remove('visible');
        if (!dbRef) {
          feedBadge.textContent = 'LOCAL';
          feedBadge.className = 'badge badge-off';
        }
      }

      function cleanText(raw) {
        var t = raw.trim();
        if (!t) return '';
        t = t.charAt(0).toUpperCase() + t.slice(1);
        if (!/[.!?;:,]$/.test(t)) t += '.';
        t = t.replace(/\s{2,}/g, ' ')
             .replace(/\bi\b/g, 'I')
             .replace(/([.!?]\s+)([a-z])/g, function(m,p,c) { return p + c.toUpperCase(); })
             .replace(/\s+([.!?,;:])/g, '$1');
        return t;
      }

      micBtn.addEventListener('click', function () {
        if (micOn) { stopMic(); } else { startMic(); }
      });

      /* ---- Copy ---- */
      document.getElementById('btnCopy').addEventListener('click', function () {
        var text = entries.map(function (e) {
          var d = e.data;
          var ts = d.ts ? new Date(d.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
          var prefix = d.type === 'note' ? '[NOTE] ' : (d.type === 'mic' ? '[MIC] ' : '[BEE] ');
          return ts + ' ' + prefix + (d.text || '');
        }).join('\n');

        if (!text) return;
        navigator.clipboard.writeText(text).then(function () {
          var btn = document.getElementById('btnCopy');
          btn.textContent = 'Done';
          setTimeout(function () { btn.textContent = 'Copy'; }, 1200);
        });
      });

      /* ---- Util ---- */
      function esc(s) {
        return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      /* ---- Boot ---- */
      function loadScript(src) {
        return new Promise(function (resolve, reject) {
          var s = document.createElement('script');
          s.src = src; s.onload = resolve; s.onerror = reject;
          document.head.appendChild(s);
        });
      }

      loadScript('https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js')
        .then(function () { return loadScript('https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js'); })
        .then(function () { return loadScript('https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js'); })
        .then(initAuth)
        .catch(function () {
          document.getElementById('authErr').textContent = 'Failed to load. Check your connection.';
        });

    })();
  </script>
</body>
</html>
